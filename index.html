<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE | Living Store</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fff; overflow-x: hidden; }
        .story-ring { border: 2px solid #ff4d4d; padding: 2px; border-radius: 50%; width: 70px; height: 70px; object-fit: cover; }
        .product-card { transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:active { transform: scale(0.95); }
        .live-notif { position: fixed; bottom: 80px; right: 20px; background: white; padding: 10px 20px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; display: flex; items-center: center; gap: 10px; border: 1px solid #eee; animation: fadeInUp 1s, fadeOutDown 1s 4s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('shop');
            const [cart, setCart] = useState([]);
            const [showNotif, setShowNotif] = useState(false);
            const [lastBuyer, setLastBuyer] = useState("");

            const buyers = ["سارة من بغداد", "أحمد من البصرة", "مريم من أربيل", "علي من النجف"];

            useEffect(() => {
                const interval = setInterval(() => {
                    setLastBuyer(buyers[Math.floor(Math.random() * buyers.length)]);
                    setShowNotif(true);
                    setTimeout(() => setShowNotif(false), 5000);
                }, 15000);
                return () => clearInterval(interval);
            }, []);

            const products = [
                { id: 1, name: "فستان السهرة الملكي", price: 85000, img: "https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=500", tag: "الأكثر مبيعاً" },
                { id: 2, name: "طقم كاجوال عصري", price: 42000, img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=500", tag: "جديد" },
                { id: 3, name: "حقيبة يد جلدية", price: 35000, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500", tag: "تصفية" },
                { id: 4, name: "حذاء كعب كلاسيك", price: 29000, img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=500", tag: "جديد" }
            ];

            return (
                <div className="min-h-screen">
                    {/* Live Notification */}
                    {showNotif && (
                        <div className="live-notif animate__animated animate__fadeInUp">
                            <div className="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                            <p className="text-[11px] font-bold text-gray-700 uppercase">اشترى {lastBuyer} منتجاً الآن!</p>
                        </div>
                    )}

                    {/* Header */}
                    <nav className="sticky top-0 z-50 bg-white/80 backdrop-blur-md px-5 h-16 flex items-center justify-between border-b">
                        <div className="text-2xl font-black tracking-tighter animate__animated animate__pulse animate__infinite">ELITE.</div>
                        <div className="flex gap-4">
                            <button onClick={() => setView('cart')} className="relative p-2">
                                🛒 <span className="absolute top-0 right-0 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart.length}</span>
                            </button>
                        </div>
                    </nav>

                    {/* Stories Section (روح الموقع) */}
                    <div className="flex overflow-x-auto no-scrollbar gap-5 p-5 bg-white shadow-sm">
                        {[1, 2, 3, 4, 5].map(i => (
                            <div key={i} className="flex flex-col items-center gap-1 flex-shrink-0">
                                <img src={`https://i.pravatar.cc/150?u=${i}`} className="story-ring hover:scale-110 transition cursor-pointer" />
                                <span className="text-[10px] text-gray-500 font-bold">تنسيقاتنا</span>
                            </div>
                        ))}
                    </div>

                    <main className="pb-24">
                        {view === 'shop' && (
                            <div>
                                <div className="p-6">
                                    <h2 className="text-xl font-black mb-4 flex items-center gap-2">
                                        تسوقي حسب الفئة <span className="text-xs font-normal text-blue-500 underline">عرض الكل</span>
                                    </h2>
                                </div>

                                <div className="grid grid-cols-2 gap-3 px-3">
                                    {products.map((p, idx) => (
                                        <div key={p.id} 
                                             className={`product-card bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-50 animate__animated animate__fadeInUp`} 
                                             style={{animationDelay: `${idx * 0.1}s`}}>
                                            <div className="relative aspect-[4/5] overflow-hidden">
                                                <img src={p.img} className="w-full h-full object-cover transition-transform duration-700 hover:scale-110" />
                                                <div className="absolute top-3 left-3 bg-white/90 text-[9px] px-2 py-1 rounded-full font-bold shadow-sm">{p.tag}</div>
                                                <button 
                                                    onClick={() => setCart([...cart, p])}
                                                    className="absolute bottom-3 right-3 bg-black text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition"
                                                >
                                                    +
                                                </button>
                                            </div>
                                            <div className="p-4">
                                                <h3 className="text-[12px] font-bold text-gray-800 truncate">{p.name}</h3>
                                                <p className="text-black font-black mt-1">{p.price.toLocaleString()} د.ع</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="p-6 animate__animated animate__fadeIn">
                                <h2 className="text-2xl font-black mb-8">حقيبة التسوق 🛍️</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-20 text-gray-400">
                                        <p>لم تضف شيئاً بعد..</p>
                                        <button onClick={() => setView('shop')} className="mt-4 text-black underline font-bold">اذهبي للتسوق الآن</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex gap-4 p-3 bg-gray-50 rounded-2xl animate__animated animate__slideInRight">
                                                <img src={item.img} className="w-20 h-24 object-cover rounded-xl" />
                                                <div className="flex flex-col justify-center">
                                                    <h4 className="font-bold text-sm">{item.name}</h4>
                                                    <p className="font-black text-blue-600">{item.price} د.ع</p>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="pt-10">
                                            <button className="w-full bg-green-500 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-green-100 flex items-center justify-center gap-2 active:scale-95 transition">
                                                تأكيد الطلب عبر واتساب 💬
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Tab Bar (الروح الحقيقية للتطبيق) */}
                    <div className="fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t flex justify-around py-3 px-2 z-[200]">
                        <button onClick={() => setView('shop')} className={`flex flex-col items-center gap-1 ${view === 'shop' ? 'text-black' : 'text-gray-300'}`}>
                            <span className="text-xl">🏠</span>
                            <span className="text-[10px] font-bold">الرئيسية</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-gray-300 opacity-50">
                            <span className="text-xl">🔍</span>
                            <span className="text-[10px] font-bold">البحث</span>
                        </button>
                        <button onClick={() => setView('cart')} className={`flex flex-col items-center gap-1 ${view === 'cart' ? 'text-black' : 'text-gray-300'}`}>
                            <span className="text-xl relative">🛍️ {cart.length > 0 && <span className="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>}</span>
                            <span className="text-[10px] font-bold">سلتك</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-gray-300 opacity-50">
                            <span className="text-xl">👤</span>
                            <span className="text-[10px] font-bold">حسابي</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
