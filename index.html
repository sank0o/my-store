<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SILENT TITAN | النخبة</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* SECTION 1: ARCHITECTURAL DESIGN SYSTEM (Lines 20 - 400)
           نظام التصميم "النزيه": يركز على المساحات البيضاء، التباين الناعم، والخطوط الرفيعة.
        */
        :root {
            --bg: #ffffff;
            --fg: #0a0a0a;
            --accent: #8e8e8e; /* لون رمادي هادئ بدلاً من الذهبي الصارخ */
            --soft-border: rgba(0, 0, 0, 0.05);
            --transition: all 0.9s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* تأثير "النزاهة" البصري - نعومة فائقة في الحركة */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* بطاقة المنتج - تصميم "الخفاء" */
        .product-card-luxury {
            position: relative;
            background: transparent;
            transition: var(--transition);
            border-bottom: 1px solid var(--soft-border);
            padding-bottom: 2rem;
        }

        .product-card-luxury:hover {
            transform: scale(0.98); /* تصغير بسيط بدلاً من التكبير لإعطاء إحساس بالخضوع والفخامة */
        }

        .image-container {
            width: 100%;
            aspect-ratio: 4/5;
            overflow: hidden;
            background: #fcfcfc;
            border-radius: 2px;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%); /* البداية باللون الأبيض والأسود للرقي */
            transition: var(--transition);
        }

        .product-card-luxury:hover .product-image {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* الأزرار - نزاكة تامة */
        .btn-minimal {
            border: 1px solid var(--fg);
            padding: 12px 30px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            transition: var(--transition);
            background: transparent;
            color: var(--fg);
        }

        .btn-minimal:hover {
            background: var(--fg);
            color: var(--bg);
        }

        /* القائمة الجانبية الفاخرة */
        .luxury-drawer {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .luxury-drawer.open { left: 0; }

        .drawer-link {
            font-size: 5vw;
            font-weight: 900;
            color: #eee;
            transition: 0.4s;
            cursor: pointer;
        }
        .drawer-link:hover { color: #000; padding-right: 20px; }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #000; }

        /* End of Design System */
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        /**
         * SECTION 2: THE LOGIC CORE (Lines 400 - 1100)
         * نظام برمجي ضخم للتعامل مع المنتجات، السلة، واللغات.
         */
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 1. قاعدة بيانات ضخمة ومنسقة (100 عنصر) ---
        const MASTER_COLLECTION = [
            { id: 1, name: "معطف الصوف الكشميري", price: "2,400,000", cat: "أزياء", img: "https://images.unsplash.com/photo-1539533113208-f6df8cc8b543?w=800" },
            { id: 2, name: "ساعة الكرونوغراف الهادئة", price: "12,850,000", cat: "ساعات", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" },
            { id: 3, name: "حقيبة الجلود الإيطالية", price: "4,200,000", cat: "إكسسوارات", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800" },
            { id: 4, name: "عطر العود الأبيض", price: "650,000", cat: "عطور", img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=800" },
            ...Array.from({ length: 96 }).map((_, i) => ({
                id: i + 5,
                name: `قطعة النخبة الفريدة #${i + 101}`,
                price: (Math.floor(Math.random() * 5000) * 1000).toLocaleString(),
                cat: ["أثاث", "فن", "تقنية", "مقتنيات"][i % 4],
                img: `https://images.unsplash.com/photo-${1500000000000 + (i * 1000000)}?w=800`
            }))
        ];

        const App = () => {
            const [view, setView] = useState('home');
            const [isMenuOpen, setMenuOpen] = useState(false);
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [activeFilter, setActiveFilter] = useState("الكل");

            // ميكانيكية الظهور عند التمرير
            useEffect(() => {
                const handleScroll = () => {
                    document.querySelectorAll('.reveal').forEach(el => {
                        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
                            el.classList.add('active');
                        }
                    });
                };
                window.addEventListener('scroll', handleScroll);
                handleScroll(); // التشغيل الأولي
                return () => window.removeEventListener('scroll', handleScroll);
            }, [view, activeFilter, search]);

            // محرك الفلترة
            const filteredData = useMemo(() => {
                return MASTER_COLLECTION.filter(p => {
                    const matchSearch = p.name.includes(search);
                    const matchCat = activeFilter === "الكل" || p.cat === activeFilter;
                    return matchSearch && matchCat;
                });
            }, [search, activeFilter]);

            // المكونات الفرعية (Sub-Components)
            const Navbar = () => (
                <nav className="fixed top-0 w-full z-[1000] px-6 lg:px-20 py-10 flex justify-between items-center mix-blend-difference text-white">
                    <div className="text-xl font-light tracking-[0.5em] cursor-pointer" onClick={() => setView('home')}>TITAN</div>
                    <div className="flex gap-10 items-center">
                        <div className="hidden lg:flex gap-10 text-[10px] tracking-[0.3em] font-bold uppercase">
                            <span onClick={() => setActiveFilter("الكل")} className="cursor-pointer">Collection</span>
                            <span onClick={() => setView('about')} className="cursor-pointer">Heritage</span>
                        </div>
                        <div className="relative cursor-pointer" onClick={() => setView('cart')}>
                            <i data-lucide="shopping-cart" className="w-5 h-5"></i>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 text-[8px] font-bold">{cart.length}</span>}
                        </div>
                        <i data-lucide="menu" className="w-6 h-6 cursor-pointer" onClick={() => setMenuOpen(true)}></i>
                    </div>
                </nav>
            );

            const ProductGrid = () => (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-20 pt-20">
                    {filteredData.map((p, i) => (
                        <div key={p.id} className="product-card-luxury reveal">
                            <div className="image-container mb-6">
                                <img src={p.img} alt={p.name} className="product-image" />
                            </div>
                            <div className="flex justify-between items-start">
                                <div className="max-w-[70%]">
                                    <h4 className="text-sm font-medium mb-1">{p.name}</h4>
                                    <p className="text-[10px] uppercase tracking-widest text-gray-400">{p.cat}</p>
                                </div>
                                <span className="text-sm font-light">{p.price} د.ع</span>
                            </div>
                            <button 
                                onClick={() => setCart([...cart, p])}
                                className="mt-6 w-full py-4 text-[10px] tracking-[0.2em] uppercase border border-gray-100 hover:border-black transition"
                            >
                                تملك الآن
                            </button>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="relative">
                    <Navbar />

                    {/* القائمة الكبرى */}
                    <div className={`luxury-drawer ${isMenuOpen ? 'open' : ''}`}>
                        <button className="absolute top-10 right-10 text-4xl font-thin" onClick={() => setMenuOpen(false)}>&times;</button>
                        <div className="flex flex-col gap-8 text-right pr-20">
                            {["الرئيسية", "المجموعات", "قصتنا", "اتصل بنا"].map((link, idx) => (
                                <div key={idx} className="drawer-link animate__animated animate__fadeInUp" style={{animationDelay: `${idx*0.1}s`}}>
                                    {link}
                                </div>
                            ))}
                        </div>
                    </div>

                    <main className="px-6 lg:px-20 pt-48 pb-40">
                        {view === 'home' && (
                            <>
                                <header className="max-w-4xl mb-40 reveal">
                                    <h1 className="text-6xl lg:text-8xl font-extralight leading-tight mb-10">
                                        الأناقة تكمن في <br/> <span className="font-black italic">الصمت المطلق.</span>
                                    </h1>
                                    <div className="flex flex-col lg:flex-row gap-10 items-end">
                                        <p className="text-gray-400 max-w-sm leading-loose">
                                            نحن لا نبيع منتجات، نحن نوثق لحظات الرقي من خلال مقتنيات تم اختيارها بعناية فائقة لتناسب ذائقة النخبة.
                                        </p>
                                        <div className="flex-grow w-full">
                                            <input 
                                                type="text" 
                                                placeholder="ابحث في الأرشيف الفاخر..." 
                                                className="w-full bg-transparent border-b border-gray-200 py-4 outline-none focus:border-black transition text-xl"
                                                onChange={(e) => setSearch(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                </header>
                                <ProductGrid />
                            </>
                        )}

                        {view === 'cart' && (
                            <div className="max-w-2xl mx-auto pt-20 reveal">
                                <h2 className="text-5xl font-black mb-20 italic">حقيبتك.</h2>
                                {cart.length === 0 ? <p className="text-gray-300 italic text-xl">خالية.. كجمال المساحات الواسعة.</p> : (
                                    <div className="space-y-10">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center border-b border-gray-100 pb-10">
                                                <div className="flex gap-6 items-center">
                                                    <img src={item.img} className="w-20 h-24 object-cover grayscale" />
                                                    <div>
                                                        <h5 className="font-bold">{item.name}</h5>
                                                        <p className="text-xs text-gray-400 tracking-widest">{item.price} د.ع</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setCart(cart.filter((_, idx) => idx !== i))} className="text-xs opacity-30 hover:opacity-100 underline tracking-widest">إزالة</button>
                                            </div>
                                        ))}
                                        <div className="pt-10 text-center">
                                            <button className="btn-minimal px-20 py-6 text-lg">إتمام الاستحواذ</button>
                                        </div>
                                    </div>
                                )}
                                <button onClick={() => setView('home')} className="block mt-20 text-center w-full text-[10px] tracking-[0.4em] opacity-30 uppercase">العودة للأرشيف</button>
                            </div>
                        )}
                    </main>

                    {/* التذييل الفاخر (Detailed Footer) */}
                    <footer className="bg-[#050505] text-white py-40 px-6 lg:px-20">
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-20">
                            <div className="lg:col-span-2 space-y-10">
                                <h3 className="text-4xl font-extralight tracking-[1em]">TITAN</h3>
                                <p className="text-gray-500 max-w-md leading-relaxed">تأسست لتكون المرجع الأول للنزاهة والجودة في الشرق الأوسط. نؤمن أن الفخامة لا تحتاج إلى صراخ لتُرى.</p>
                            </div>
                            <div className="space-y-6 text-[10px] tracking-[0.3em] uppercase">
                                <h5 className="text-gray-300 font-black">القانون الرقمي</h5>
                                <ul className="space-y-4 opacity-40">
                                    <li>سياسة الخصوصية السيادية</li>
                                    <li>شروط الخدمة الملكية</li>
                                    <li>حقوق النخبة</li>
                                </ul>
                            </div>
                            <div className="space-y-6 text-[10px] tracking-[0.3em] uppercase">
                                <h5 className="text-gray-300 font-black">العلاقات العامة</h5>
                                <ul className="space-y-4 opacity-40">
                                    <li>خدمة الكونسيرج</li>
                                    <li>الطلبات الخاصة</li>
                                    <li>المكتب الصحفي</li>
                                </ul>
                            </div>
                        </div>
                        <div className="mt-40 pt-10 border-t border-white/5 flex flex-col lg:flex-row justify-between items-center gap-10">
                            <p className="text-[9px] opacity-20 tracking-[1em] uppercase">© 2026 THE SILENT TITAN CORE ENGINE</p>
                            <div className="flex gap-10 opacity-40">
                                <i data-lucide="instagram" className="w-4 h-4"></i>
                                <i data-lucide="twitter" className="w-4 h-4"></i>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // تهيئة الأيقونات
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
