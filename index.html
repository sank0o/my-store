<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | تجربة تسوق فاخرة</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fff; color: #1a1a1a; }
        .luxury-shadow { box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03); }
        .product-card img { transition: transform 0.6s cubic-bezier(0.33, 1, 0.68, 1); }
        .product-card:hover img { transform: scale(1.08); }
        .btn-luxury { background: #000; color: #fff; transition: all 0.3s; position: relative; overflow: hidden; }
        .btn-luxury:hover { background: #333; letter-spacing: 1px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #000; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('shop'); // shop, cart, checkout
            const [products, setProducts] = useState([
                { id: 1, name: "ساعة رويال أواك", price: 4500, img: "https://images.unsplash.com/photo-1547996160-81dfa63595dd?w=800", desc: "إصدار محدود من الفولاذ المقاوم للصدأ." },
                { id: 2, name: "عطر ليجند نوار", price: 890, img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=800", desc: "رائحة خشبية فريدة تدوم طويلاً." },
                { id: 3, name: "حقيبة جلد إيطالي", price: 3200, img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=800", desc: "صناعة يدوية من أجود أنواع الجلود." }
            ]);
            const [cart, setCart] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);

            const addToCart = (product) => {
                setCart([...cart, { ...product, cartId: Date.now() }]);
                alert("تمت إضافة القطعة إلى حقيبتك");
            };

            const removeFromCart = (id) => {
                setCart(cart.filter(item => item.cartId !== id));
            };

            const totalPrice = cart.reduce((sum, item) => sum + Number(item.price), 0);

            const sendToWhatsApp = () => {
                const message = `طلب جديد من متجر ELITE:\n` + 
                                cart.map(i => `- ${i.name} (${i.price} ر.س)`).join('\n') + 
                                `\nإجمالي المبلغ: ${totalPrice} ر.س`;
                window.open(`https://wa.me/966XXXXXXXXX?text=${encodeURIComponent(message)}`);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-8 py-5 flex justify-between items-center">
                        <h1 className="text-2xl font-black tracking-[0.2em] cursor-pointer" onClick={() => setView('shop')}>ELITE</h1>
                        <div className="flex gap-8 items-center font-bold text-sm tracking-widest">
                            <span className="cursor-pointer hover:opacity-50" onClick={() => setView('shop')}>المتجر</span>
                            <div className="relative cursor-pointer" onClick={() => setView('cart')}>
                                <span>الحقيبة</span>
                                {cart.length > 0 && <span className="absolute -top-3 -right-4 bg-black text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center">{cart.length}</span>}
                            </div>
                            <button onClick={() => setIsAdmin(!isAdmin)} className="bg-gray-100 px-3 py-1 rounded text-[10px]">{isAdmin ? 'EXIT' : 'ADMIN'}</button>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="mt-24 flex-grow container mx-auto px-6 max-w-7xl">
                        
                        {view === 'shop' && (
                            <section className="animate-fade-in">
                                <header className="py-20 text-center">
                                    <h2 className="text-xs uppercase tracking-[0.5em] text-gray-400 mb-4">New Collection 2026</h2>
                                    <h3 className="text-5xl font-light tracking-tight">مجموعة النخبة المختارة</h3>
                                </header>

                                {isAdmin && (
                                    <div className="mb-20 p-10 border border-black rounded-sm max-w-2xl mx-auto">
                                        <h4 className="font-bold mb-6 underline">إضافة قطعة جديدة</h4>
                                        <form className="grid gap-4" onSubmit={(e) => {
                                            e.preventDefault();
                                            const f = new FormData(e.target);
                                            setProducts([{id: Date.now(), name: f.get('n'), price: f.get('p'), img: f.get('i'), desc: f.get('d')}, ...products]);
                                            e.target.reset();
                                        }}>
                                            <input name="n" placeholder="اسم المنتج" className="border-b p-2 outline-none" required />
                                            <input name="p" placeholder="السعر" className="border-b p-2 outline-none" required />
                                            <input name="i" placeholder="رابط الصورة المباشر" className="border-b p-2 outline-none" required />
                                            <textarea name="d" placeholder="وصف قصير" className="border-b p-2 outline-none" />
                                            <button className="btn-luxury py-3 mt-4 uppercase text-xs font-bold">حفظ في المتجر</button>
                                        </form>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-16 mb-20">
                                    {products.map(p => (
                                        <div key={p.id} className="product-card group cursor-pointer">
                                            <div className="relative aspect-[3/4] overflow-hidden bg-gray-50 mb-6">
                                                <img src={p.img} className="w-full h-full object-cover" />
                                                <button 
                                                    onClick={() => addToCart(p)}
                                                    className="absolute bottom-0 w-full py-4 bg-black text-white opacity-0 group-hover:opacity-100 transition-all duration-300 text-xs tracking-widest font-bold"
                                                >
                                                    أضف للحقيبة +
                                                </button>
                                            </div>
                                            <div className="text-center">
                                                <h4 className="font-bold text-lg mb-1">{p.name}</h4>
                                                <p className="text-gray-400 text-xs mb-3 tracking-wide">{p.desc}</p>
                                                <span className="text-sm font-light tracking-widest">{p.price} ر.س</span>
                                            </div>
                                            {isAdmin && (
                                                <button onClick={() => setProducts(products.filter(x => x.id !== p.id))} className="w-full text-[10px] mt-4 text-red-400 hover:text-red-600">إزالة من العرض</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </section>
                        )}

                        {view === 'cart' && (
                            <section className="py-20 max-w-2xl mx-auto animate-fade-in">
                                <h2 className="text-3xl font-light mb-12 text-center tracking-widest">حقيبة التسوق</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-20 border-t border-b">
                                        <p className="text-gray-400 mb-8 uppercase tracking-widest text-xs">حقيبتك فارغة حالياً</p>
                                        <button onClick={() => setView('shop')} className="btn-luxury px-10 py-4 text-[10px] font-bold">العودة للمتجر</button>
                                    </div>
                                ) : (
                                    <div className="space-y-8">
                                        {cart.map(item => (
                                            <div key={item.cartId} className="flex gap-6 items-center border-b pb-8">
                                                <img src={item.img} className="w-24 h-32 object-cover" />
                                                <div className="flex-grow">
                                                    <h4 className="font-bold">{item.name}</h4>
                                                    <p className="text-sm text-gray-400">{item.price} ر.س</p>
                                                </div>
                                                <button onClick={() => removeFromCart(item.cartId)} className="text-xs text-gray-300 hover:text-black">إزالة</button>
                                            </div>
                                        ))}
                                        <div className="pt-10 flex justify-between items-end">
                                            <div>
                                                <p className="text-xs text-gray-400 uppercase tracking-[0.3em] mb-2">Total Price</p>
                                                <span className="text-3xl font-light">{totalPrice} ر.س</span>
                                            </div>
                                            <button onClick={sendToWhatsApp} className="btn-luxury px-12 py-5 text-xs font-bold tracking-widest">إتمام الطلب عبر واتساب</button>
                                        </div>
                                    </div>
                                )}
                            </section>
                        )}
                    </main>

                    <footer className="py-12 border-t border-gray-100 text-center">
                        <p className="text-[10px] uppercase tracking-[0.8em] text-gray-300">Elite Store — Luxury Experience</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
