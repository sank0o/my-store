<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE INFINITY | التجربة الغامرة</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Cairo', sans-serif; 
            background: #000; 
            color: #fff; 
            overflow-x: hidden;
            margin: 0;
        }

        /* فقاعات الخلفية المتحركة (الروح) */
        .blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: linear-gradient(180deg, #4f46e5 0%, #7c3aed 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }
        .blob-2 { background: #db2777; left: -200px; top: -200px; animation-delay: -5s; }
        .blob-3 { background: #2563eb; right: -200px; bottom: -200px; animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* التصميم الزجاجي */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
        }

        /* بطاقة المنتج الفائقة */
        .product-card {
            perspective: 1000px;
        }
        .inner-card {
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-style: preserve-3d;
        }
        .product-card:hover .inner-card {
            transform: rotateY(10deg) rotateX(5deg);
        }

        /* نصوص ضخمة شفافة */
        .bg-text {
            position: fixed;
            font-size: 20vw;
            font-weight: 900;
            color: rgba(255,255,255,0.02);
            z-index: -2;
            white-space: nowrap;
            pointer-events: none;
            top: 50%;
            transform: translateY(-50%);
        }

        /* زر الشراء المشع */
        .btn-glow {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn-glow:hover {
            box-shadow: 0 0 40px rgba(255,255,255,0.5);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="bg-text">INFINITY ELITE</div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('shop');
            const [cart, setCart] = useState([]);
            
            const products = [
                { id: 1, name: "Luxury Watch", price: "2,500$", img: "https://images.unsplash.com/photo-1547996160-81dfa63595dd?w=800" },
                { id: 2, name: "Premium Scent", price: "450$", img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=800" },
                { id: 3, name: "Limited Edition Bag", price: "1,200$", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=800" },
                { id: 4, name: "Designer Heels", price: "890$", img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=800" }
            ];

            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [activeTab]);

            return (
                <div className="min-h-screen flex flex-col items-center p-6 pb-32">
                    {/* Header */}
                    <header className="w-full max-w-5xl flex justify-between items-center py-10">
                        <h1 className="text-3xl font-black italic tracking-tighter">ELITE∞</h1>
                        <div className="glass px-6 py-3 flex gap-8">
                            <i data-lucide="search" className="w-5 h-5 opacity-50"></i>
                            <div onClick={() => setActiveTab('cart')} className="relative cursor-pointer">
                                <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                                {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-white text-black text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart.length}</span>}
                            </div>
                        </div>
                    </header>

                    {activeTab === 'shop' && (
                        <div className="w-full max-w-6xl">
                            {/* Hero Text */}
                            <div className="text-center my-20">
                                <h2 className="text-7xl font-black mb-4 leading-none">مُستقبل <br/> <span className="text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600">الأناقة الراقية</span></h2>
                                <p className="opacity-40 tracking-widest uppercase text-xs">Collection 2026 • Limited Edition</p>
                            </div>

                            {/* Products Grid */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                {products.map(p => (
                                    <div key={p.id} className="product-card">
                                        <div className="inner-card glass p-4 h-full">
                                            <div className="rounded-[20px] overflow-hidden h-[400px] relative">
                                                <img src={p.img} className="w-full h-full object-cover" />
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex flex-col justify-end p-8">
                                                    <h3 className="text-3xl font-bold mb-2">{p.name}</h3>
                                                    <p className="text-xl font-light mb-6 opacity-80">{p.price}</p>
                                                    <button 
                                                        onClick={() => setCart([...cart, p])}
                                                        className="btn-glow w-full py-5 rounded-2xl font-black uppercase text-xs"
                                                    >
                                                        امتلاك القطعة الآن
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {activeTab === 'cart' && (
                        <div className="w-full max-w-2xl glass p-10 mt-10 animate-pulse-slow">
                            <h2 className="text-4xl font-black mb-10 italic">حقيبة النخبة.</h2>
                            {cart.length === 0 ? <p className="opacity-30">الحقيبة تنتظر اختياراتك...</p> : (
                                <div className="space-y-6">
                                    {cart.map((item, i) => (
                                        <div key={i} className="flex justify-between items-center border-b border-white/10 pb-6">
                                            <div className="flex gap-4 items-center">
                                                <img src={item.img} className="w-16 h-16 rounded-xl object-cover" />
                                                <span className="font-bold">{item.name}</span>
                                            </div>
                                            <button onClick={() => setCart(cart.filter((_, idx) => idx !== i))} className="text-red-500">حذف</button>
                                        </div>
                                    ))}
                                    <button className="w-full btn-glow py-6 rounded-3xl font-black text-xl mt-10">إتمام الطلب الملكي</button>
                                </div>
                            )}
                            <button onClick={() => setActiveTab('shop')} className="w-full mt-6 text-xs opacity-30 uppercase tracking-widest">العودة للمعرض</button>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-8 w-[90%] max-w-md glass py-5 px-10 flex justify-around items-center">
                        <i data-lucide="home" onClick={() => setActiveTab('shop')} className={`cursor-pointer ${activeTab === 'shop' ? 'text-white' : 'opacity-30'}`}></i>
                        <i data-lucide="layout-grid" className="opacity-30"></i>
                        <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center -mt-16 shadow-2xl">
                             <i data-lucide="zap" className="text-black"></i>
                        </div>
                        <i data-lucide="heart" className="opacity-30"></i>
                        <i data-lucide="user" className="opacity-30"></i>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
