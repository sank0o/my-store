<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite Store</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [products, setProducts] = useState([{ id: 1, name: "منتج تجريبي", price: 100, img: "https://picsum.photos/400" }]);
            const [admin, setAdmin] = useState(false);
            const addP = (e) => {
                e.preventDefault();
                const f = new FormData(e.target);
                setProducts([{ id: Date.now(), name: f.get('n'), price: f.get('p'), img: f.get('i') }, ...products]);
                e.target.reset();
            };
            return (
                <div class="min-h-screen p-5">
                    <nav class="flex justify-between p-4 bg-white rounded-2xl shadow mb-5">
                        <h1 class="text-xl font-bold">ELITE.</h1>
                        <button onClick={() => setAdmin(!admin)} class="text-xs bg-black text-white px-3 py-1 rounded-full">{admin ? 'خروج' : 'دخول المسؤول'}</button>
                    </nav>
                    {admin && (
                        <form onSubmit={addP} class="bg-white p-5 rounded-2xl mb-10 grid gap-3">
                            <input name="n" placeholder="اسم المنتج" class="p-2 border rounded" required />
                            <input name="p" placeholder="السعر" class="p-2 border rounded" required />
                            <input name="i" placeholder="رابط الصورة" class="p-2 border rounded" required />
                            <button class="bg-blue-600 text-white p-2 rounded">إضافة</button>
                        </form>
                    )}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {products.map(p => (
                            <div key={p.id} class="bg-white p-3 rounded-2xl shadow">
                                <img src={p.img} class="h-40 w-full object-cover rounded-xl" />
                                <h3 class="font-bold mt-2">{p.name}</h3>
                                <p class="text-blue-600 font-bold">{p.price} ر.س</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
