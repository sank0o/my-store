<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ELITE ULTIMATE | النظام المتكامل</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root { --accent: #000; --bg: #ffffff; --card: #f8f8f8; }
        [data-theme='dark'] { --accent: #fff; --bg: #0a0a0a; --card: #151515; }
        
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--accent); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* تأثيرات الفخامة القصوى */
        .luxury-card { position: relative; border-radius: 2.5rem; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); overflow: hidden; }
        .luxury-card:hover { transform: translateY(-15px) scale(1.02); }
        .image-zoom { transition: 1.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .luxury-card:hover .image-zoom { transform: scale(1.15); }
        
        /* أنظمة الإضاءة */
        .neon-border { border: 1px solid rgba(128, 128, 128, 0.1); }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        
        /* تحسينات الموبايل */
        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(var(--bg), 0.8); backdrop-filter: blur(20px); z-index: 1000; padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- محرك النظام الأساسي ---
        const App = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [theme, setTheme] = useState('light');
            const [view, setView] = useState('home'); 
            const [products, setProducts] = useState([
                { id: 1, name: "ساعة أوديمار بيجيه", price: 1250000, cat: "ساعات", img: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=800", stock: 5, likes: 124, tag: "Exclusive" },
                { id: 2, name: "حقيبة هيرميس كايلي", price: 850000, cat: "حقائب", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=800", stock: 2, likes: 89, tag: "New" },
                { id: 3, name: "عطر روجا دوف", price: 145000, cat: "عطور", img: "https://images.unsplash.com/photo-1541643600914-78b084683601?w=800", stock: 15, likes: 210, tag: "Best Seller" },
                { id: 4, name: "نظارة لويس فيتون", price: 65000, cat: "إكسسوارات", img: "https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=800", stock: 8, likes: 45, tag: "Trend" }
            ]);
            const [cart, setCart] = useState([]);
            const [wishlist, setWishlist] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [activeCat, setActiveCat] = useState("الكل");
            const [isAdmin, setIsAdmin] = useState(false);

            // إعدادات النظام عند التشغيل
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                setTimeout(() => setIsLoaded(true), 2000);
                if (window.lucide) lucide.createIcons();
            }, [theme, view, products]);

            // محرك البحث والفلاتر الذكي
            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchSearch = p.name.includes(searchQuery);
                    const matchCat = activeCat === "الكل" || p.cat === activeCat;
                    return matchSearch && matchCat;
                });
            }, [searchQuery, activeCat, products]);

            // وظائف السلة والمفضلة
            const toggleWishlist = (id) => {
                setWishlist(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            const addToCart = (p) => {
                setCart([...cart, { ...p, cartId: Date.now() }]);
            };

            const totalAmount = cart.reduce((s, i) => s + i.price, 0);

            // مكونات الواجهة (Sub-Components)
            const ProductCard = ({ p }) => (
                <div className="luxury-card neon-border group animate__animated animate__fadeInUp bg-[var(--card)]">
                    <div className="relative aspect-[4/5] overflow-hidden">
                        <img src={p.img} className="image-zoom w-full h-full object-cover" loading="lazy" />
                        <div className="absolute top-5 right-5 flex flex-col gap-3">
                            <button onClick={(e) => {e.stopPropagation(); toggleWishlist(p.id)}} className="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center transition hover:bg-red-500">
                                <i data-lucide="heart" className={`w-5 h-5 ${wishlist.includes(p.id) ? 'fill-white stroke-white' : 'stroke-white'}`}></i>
                            </button>
                        </div>
                        {p.tag && <div className="absolute bottom-5 left-5 bg-black text-white text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest">{p.tag}</div>}
                    </div>
                    <div className="p-8">
                        <div className="flex justify-between items-start mb-4">
                            <div>
                                <p className="text-[10px] text-gray-500 uppercase tracking-[0.3em] mb-1">{p.cat}</p>
                                <h3 className="text-xl font-bold">{p.name}</h3>
                            </div>
                            <span className="text-xl font-black">{p.price.toLocaleString()} د.ع</span>
                        </div>
                        <button onClick={() => addToCart(p)} className="w-full bg-[var(--accent)] text-[var(--bg)] py-5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] transition hover:opacity-80 active:scale-95">
                            إضافة للحقيبة
                        </button>
                    </div>
                </div>
            );

            if (!isLoaded) return (
                <div className="h-screen w-full flex flex-col items-center justify-center bg-black text-white">
                    <h1 className="text-4xl font-black tracking-[0.5em] mb-4 animate__animated animate__pulse animate__infinite">ELITE</h1>
                    <div className="w-48 h-[2px] bg-white/10 relative overflow-hidden">
                        <div className="shimmer absolute inset-0 w-full h-full"></div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {/* Header المتقدم */}
                    <nav className="fixed top-0 w-full z-[100] px-8 py-6 flex justify-between items-center glass-nav">
                        <div className="flex items-center gap-8">
                            <h1 className="text-2xl font-black tracking-tighter cursor-pointer" onClick={() => setView('home')}>ELITE.</h1>
                            <div className="hidden md:flex gap-6 text-[10px] font-bold uppercase tracking-widest">
                                {['الكل', 'ساعات', 'حقائب', 'عطور'].map(c => (
                                    <span key={c} onClick={() => {setActiveCat(c); setView('home')}} className={`cursor-pointer ${activeCat === c ? 'border-b-2 border-black' : 'opacity-40'}`}>{c}</span>
                                ))}
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <i data-lucide={theme === 'light' ? 'moon' : 'sun'} className="cursor-pointer w-5 h-5" onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}></i>
                            <div className="relative cursor-pointer" onClick={() => setView('cart')}>
                                <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                                {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-red-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center">{cart.length}</span>}
                            </div>
                            <button onClick={() => setIsAdmin(!isAdmin)} className="bg-black text-white text-[8px] px-3 py-1 rounded-full uppercase font-bold">Panel</button>
                        </div>
                    </nav>

                    <main className="pt-24 pb-32 px-6 max-w-[1600px] mx-auto">
                        
                        {view === 'home' && (
                            <section>
                                {/* محرك البحث الفخم */}
                                <div className="py-12 flex flex-col items-center">
                                    <input 
                                        type="text" 
                                        placeholder="ما الذي تبحث عنه اليوم؟" 
                                        className="w-full max-w-2xl bg-[var(--card)] text-center text-2xl font-light py-8 rounded-[3rem] outline-none border-none luxury-shadow"
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                </div>

                                {/* شبكة المنتجات */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10">
                                    {filteredProducts.map(p => <ProductCard key={p.id} p={p} />)}
                                </div>
                            </section>
                        )}

                        {view === 'cart' && (
                            <div className="max-w-4xl mx-auto py-20 animate__animated animate__fadeIn">
                                <h2 className="text-6xl font-black mb-16 italic tracking-tighter text-center">Checkout.</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-20 opacity-30">الحقيبة فارغة تماماً</div>
                                ) : (
                                    <div className="space-y-6">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex items-center justify-between p-8 bg-[var(--card)] rounded-[2.5rem] luxury-shadow">
                                                <div className="flex items-center gap-6">
                                                    <img src={item.img} className="w-24 h-24 rounded-3xl object-cover" />
                                                    <div>
                                                        <h4 className="text-xl font-bold">{item.name}</h4>
                                                        <p className="text-sm opacity-50">{item.price.toLocaleString()} د.ع</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setCart(cart.filter(x => x.cartId !== item.cartId))} className="w-12 h-12 flex items-center justify-center rounded-full bg-red-50 text-red-500"><i data-lucide="trash-2"></i></button>
                                            </div>
                                        ))}
                                        <div className="mt-20 p-10 border-t flex flex-col items-center">
                                            <p className="text-sm opacity-40 uppercase tracking-[0.5em] mb-4">Total Amount</p>
                                            <h3 className="text-5xl font-black mb-10">{totalAmount.toLocaleString()} د.ع</h3>
                                            <button onClick={() => window.open(`https://wa.me/رقمك?text=طلب_جديد`)} className="w-full max-w-md bg-black text-white py-6 rounded-full font-black tracking-widest text-lg animate-pulse">تأكيد الطلب عبر واتساب</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {isAdmin && (
                            <div className="fixed inset-0 z-[200] bg-black/95 text-white p-10 overflow-y-auto">
                                <button onClick={() => setIsAdmin(false)} className="absolute top-10 right-10 text-4xl font-thin">&times;</button>
                                <h2 className="text-4xl font-black mb-12 uppercase tracking-tighter italic">Dashboard Control.</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-20">
                                    <div className="p-10 border border-white/10 rounded-3xl">
                                        <p className="text-xs opacity-50 uppercase mb-2">إجمالي المنتجات</p>
                                        <h4 className="text-4xl font-black">{products.length}</h4>
                                    </div>
                                    <div className="p-10 border border-white/10 rounded-3xl">
                                        <p className="text-xs opacity-50 uppercase mb-2">المخزون الكلي</p>
                                        <h4 className="text-4xl font-black">{products.reduce((a,b)=>a+b.stock, 0)}</h4>
                                    </div>
                                    <div className="p-10 border border-white/10 rounded-3xl text-green-400">
                                        <p className="text-xs opacity-50 uppercase mb-2">حالة النظام</p>
                                        <h4 className="text-4xl font-black italic uppercase">Live</h4>
                                    </div>
                                </div>
                                <div className="bg-white/5 p-10 rounded-[3rem]">
                                    <h3 className="text-2xl font-bold mb-8">إضافة منتج جديد</h3>
                                    <form className="grid grid-cols-1 md:grid-cols-2 gap-6" onSubmit={(e) => {
                                        e.preventDefault();
                                        const f = new FormData(e.target);
                                        const nP = { id: Date.now(), name: f.get('n'), price: Number(f.get('p')), cat: f.get('c'), img: f.get('i'), stock: 5, tag: "New" };
                                        setProducts([nP, ...products]);
                                        e.target.reset();
                                        alert("تم التحديث بنجاح");
                                    }}>
                                        <input name="n" placeholder="اسم المنتج الفاخر" className="bg-transparent border-b border-white/20 p-4 outline-none" required />
                                        <input name="p" placeholder="السعر" type="number" className="bg-transparent border-b border-white/20 p-4 outline-none" required />
                                        <input name="i" placeholder="رابط الصورة HQ" className="bg-transparent border-b border-white/20 p-4 outline-none" required />
                                        <select name="c" className="bg-transparent border-b border-white/20 p-4 outline-none">
                                            <option value="ساعات">ساعات</option>
                                            <option value="حقائب">حقائب</option>
                                            <option value="عطور">عطور</option>
                                        </select>
                                        <button className="md:col-span-2 bg-white text-black py-6 rounded-2xl font-black text-xs uppercase tracking-[0.5em] mt-8 hover:bg-gray-200">نشر في النظام</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Tab Bar للجوال */}
                    <div className="tab-bar md:hidden flex justify-around py-5 luxury-shadow">
                        <button onClick={() => setView('home')} className={view === 'home' ? 'text-black' : 'opacity-30'}><i data-lucide="home"></i></button>
                        <button onClick={() => setView('home')} className="opacity-30"><i data-lucide="search"></i></button>
                        <button onClick={() => setView('cart')} className={view === 'cart' ? 'text-black' : 'opacity-30'}><i data-lucide="shopping-cart"></i></button>
                        <button onClick={() => setIsAdmin(true)} className="opacity-30"><i data-lucide="user"></i></button>
                    </div>

                    <footer className="py-20 text-center border-t border-gray-50 opacity-20 text-[10px] uppercase tracking-[1em]">Elite Ultimate Store Engine</footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
