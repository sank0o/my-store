<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS ELITE | المتجر الاستهلاكي</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb; /* أزرق استهلاكي قوي ونظيف */
            --bg-light: #F8FAFC;
            --dark: #0F172A;
            --card-radius: 32px;
        }

        body {
            background-color: var(--bg-light);
            color: var(--dark);
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
        }

        /* تصميم البطاقة المطابق للصورة */
        .nexus-card {
            background: #FFFFFF;
            border-radius: var(--card-radius);
            padding: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0,0,0,0.02);
        }

        .nexus-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 25px 50px rgba(0,0,0,0.07);
        }

        .img-box {
            background: #F1F5F9;
            border-radius: 26px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            position: relative;
        }

        .product-img {
            width: 80%;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.1));
        }

        /* الفئات */
        .cat-pill {
            padding: 12px 24px;
            border-radius: 20px;
            background: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            white-space: nowrap;
        }

        .cat-pill.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        /* الملاحة السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            background: var(--dark);
            border-radius: 28px;
            padding: 20px;
            display: flex;
            justify-content: space-around;
            z-index: 9999;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .nav-icon {
            color: rgba(255,255,255,0.4);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav-icon.active { color: white; }

        /* حجم الأيقونات */
        .lucide {
            width: 24px;
            height: 24px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home');
            const [activeCat, setActiveCat] = useState('الأحذية');

            // --- هذا الجزء هو المسؤول عن تشغيل الأيقونات فوراً ---
            useEffect(() => {
                const initIcons = () => {
                    if (window.lucide) {
                        window.lucide.createIcons();
                    }
                };
                initIcons();
                // تشغيل احتياطي للتأكد من الرندر
                const timer = setTimeout(initIcons, 100);
                return () => clearTimeout(timer);
            }, [view, activeCat]);

            const products = [
                { id: 1, name: "Air Max Pro", price: "120", cat: "الأحذية", img: "https://i.ibb.co/m0fXhF1/shoes-2.png" },
                { id: 2, name: "Jordan Retro", price: "180", cat: "الأحذية", img: "https://i.ibb.co/L8f7vKB/shoes-1.png" },
                { id: 3, name: "Premium Bag", price: "85", cat: "الحقائب", img: "https://i.ibb.co/XW8n9X0/bag-1.png" },
                { id: 4, name: "Dior Edition", price: "320", cat: "الحقائب", img: "https://i.ibb.co/XW8n9X0/bag-1.png" },
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen bg-slate-50 pb-40">
                    
                    {/* Header */}
                    <div className="flex justify-between items-center px-6 py-10">
                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-50">
                            <i data-lucide="grid"></i>
                        </div>
                        <h1 className="text-2xl font-black italic tracking-tighter uppercase text-blue-600">NEXUS</h1>
                        <div className="bg-white p-3 rounded-2xl shadow-sm border border-gray-50">
                            <i data-lucide="search"></i>
                        </div>
                    </div>

                    {/* Banner */}
                    <div className="px-6 mb-10">
                        <div className="bg-slate-900 text-white rounded-[32px] p-8 relative overflow-hidden h-[190px] flex flex-col justify-center shadow-xl">
                            <div className="relative z-10">
                                <p className="text-blue-400 font-bold text-xs mb-1 uppercase tracking-widest">تخفيضات الربيع</p>
                                <h3 className="text-2xl font-black mb-4 leading-tight">خصم يصل إلى <br/> 40% للأحذية</h3>
                                <button className="bg-blue-600 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-700">اكتشف الآن</button>
                            </div>
                            <img src="https://i.ibb.co/m0fXhF1/shoes-2.png" className="absolute -right-10 top-2 w-52 rotate-[-20deg] opacity-40" />
                        </div>
                    </div>

                    {/* Categories */}
                    <div className="px-6 mb-8">
                        <div className="flex justify-between items-end mb-6">
                            <h3 className="text-xl font-black italic">الأقسام</h3>
                            <span className="text-xs text-blue-500 font-bold">المزيد</span>
                        </div>
                        <div className="flex gap-4 overflow-x-auto no-scrollbar py-2">
                            {["الأحذية", "الحقائب", "الساعات", "العطور"].map(c => (
                                <div 
                                    key={c} 
                                    onClick={() => setActiveCat(c)}
                                    className={`cat-pill ${activeCat === c ? 'active' : ''}`}
                                >
                                    {c}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Grid */}
                    <div className="grid grid-cols-2 gap-5 px-6">
                        {products.filter(p => p.cat === activeCat || activeCat === 'الكل').map((p) => (
                            <div key={p.id} className="nexus-card">
                                <div className="img-box">
                                    <img src={p.img} className="product-img" />
                                    <div className="absolute top-4 left-4 bg-white/90 p-2 rounded-full shadow-sm">
                                        <i data-lucide="heart" className="w-4 h-4 text-red-500"></i>
                                    </div>
                                </div>
                                <h4 className="font-bold text-sm mb-1 truncate">{p.name}</h4>
                                <div className="flex justify-between items-center">
                                    <span className="font-black text-lg text-blue-600">${p.price}</span>
                                    <div className="flex items-center gap-1 bg-yellow-50 px-2 py-1 rounded-lg">
                                        <i data-lucide="star" className="w-3 h-3 text-yellow-500 fill-current"></i>
                                        <span className="text-[10px] font-black">4.9</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="bottom-nav">
                        <div onClick={() => setView('home')} className={`nav-icon ${view === 'home' ? 'active' : ''}`}>
                            <i data-lucide="home"></i>
                        </div>
                        <div onClick={() => setView('cart')} className={`nav-icon ${view === 'cart' ? 'active' : ''}`}>
                            <i data-lucide="shopping-bag"></i>
                        </div>
                        <div className="nav-icon"><i data-lucide="heart"></i></div>
                        <div className="nav-icon"><i data-lucide="user"></i></div>
                    </div>

                    {/* Cart View Overlay */}
                    {view === 'cart' && (
                        <div className="fixed inset-0 bg-white z-[99999] p-10 flex flex-col items-center justify-center animate-modal">
                            <i data-lucide="shopping-cart" className="w-20 h-20 text-gray-200 mb-6"></i>
                            <h2 className="text-3xl font-black italic mb-4">السلة فارغة</h2>
                            <button onClick={() => setView('home')} className="bg-blue-600 text-white px-10 py-4 rounded-2xl font-black">العودة للمتجر</button>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
