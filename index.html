<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONSUMER TITAN | متجر الاستهلاك السريع</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* SECTION 1: CONSUMER DESIGN SYSTEM (Lines 20 - 400)
           نظام التصميم "الاستهلاكي": يركز على الوضوح، النشاط، وسهولة التصفح.
           لقد غيرنا الألوان الرمادية إلى ألوان حيوية (الأزرق السماوي).
        */
        :root {
            --bg: #ffffff;
            --fg: #1a1a1a;
            --primary: #3498db; /* لون أساسي استهلاكي (أزرق حيوي) بدلاً من الرمادي الهادئ */
            --accent: #f39c12; /* لون ثانوي (برتقالي دافئ) لتمييز الخصومات والعروض */
            --soft-border: rgba(0, 0, 0, 0.05);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* حركة أسرع وأكثر نشاطاً للمتجر الاستهلاكي */
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            letter-spacing: -0.01em;
        }

        /* تأثير "الوضوح الاستهلاكي" - ظهور أسرع عند التمرير */
        .reveal {
            opacity: 0;
            transform: translateY(15px);
            transition: var(--transition);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* بطاقة المنتج الاستهلاكية - تصميم "واضح" و "جذاب" */
        .product-card-luxury {
            position: relative;
            background: #fff;
            transition: var(--transition);
            border: 1px solid var(--soft-border);
            border-radius: 20px; /* زوايا منحنية وودودة بدلاً من الحادة */
            overflow: hidden;
            padding: 1rem;
        }

        .product-card-luxury:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.05); /* ظل ناعم وودود */
        }

        .image-container {
            width: 100%;
            aspect-ratio: 1/1.1;
            overflow: hidden;
            background: #fdfdfd;
            border-radius: 15px;
            margin-bottom: 1rem;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0%); /* تصفح المنتجات بألوانها الطبيعية فوراً */
            transition: var(--transition);
        }

        .product-card-luxury:hover .product-image {
            transform: scale(1.08); /* تكبير بسيط وواضح */
        }

        /* الأزرار الاستهلاكية - "عملية" و "واضحة" */
        .btn-minimal {
            background: var(--primary); /* استخدام اللون الأساسي للأزرار */
            color: var(--bg);
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
            border: none;
        }

        .btn-minimal:hover {
            background: #2c81ba; /* لون أغمق قليلاً عند التمرير للفعالية */
            transform: translateY(-2px);
        }

        /* القائمة الجانبية الاستهلاكية */
        .luxury-drawer {
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 9999;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid var(--soft-border);
        }
        .luxury-drawer.open { left: 0; }

        .drawer-link {
            font-size: 4vw;
            font-weight: 800;
            color: #d1d1d1;
            transition: 0.3s;
            cursor: pointer;
        }
        .drawer-link:hover { color: var(--fg); padding-right: 15px; }

        /* شريط التمرير الاستهلاكي - أوضح قليلاً */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }

        /* تذييل الصفحة الاستهلاكي */
        .footer-elite { background: var(--primary); color: #fff; }
        .footer-elite h3 { color: #fff; }
        .footer-elite h5 { color: rgba(255,255,255,0.8); }
        .footer-elite p { color: rgba(255,255,255,0.7); }

        /* End of Design System */
    </style>
</head>
<body class="safe-area-pb">

    <div id="root"></div>

    <script type="text/babel">
        /**
         * SECTION 2: THE LOGIC CORE (Lines 400 - 1100+)
         * نظام برمجي ضخم للتعامل مع المنتجات، السلة، واللغات.
         */
        const { useState, useEffect, useMemo, useRef } = React;

        // --- 1. قاعدة بيانات ضخمة ومنسقة (100 عنصر) ---
        const MASTER_COLLECTION = [
            { id: 1, name: "نايكي إير ماكس الأساسي", price: "185,000", cat: "أحذية", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" },
            { id: 2, name: "حقيبة جينز يومية", price: "65,000", cat: "حقائب", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=800" },
            { id: 3, name: "عطر ليجند الحيوي", price: "95,000", cat: "عطور", img: "https://images.unsplash.com/photo-1594035910387-fea47794261f?w=800" },
            { id: 4, name: "ساعة كاجوال ذكية", price: "245,000", cat: "ساعات", img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800" },
            ...Array.from({ length: 96 }).map((_, i) => ({
                id: i + 5,
                name: `منتج النخبة المخصص #${i + 101}`,
                price: (Math.floor(Math.random() * 500) * 1000).toLocaleString(),
                cat: ["أحذية", "حقائب", "عطور", "ساعات"][i % 4],
                img: `https://images.unsplash.com/photo-${1500000000000 + (i * 1000000)}?w=800`
            }))
        ];

        const App = () => {
            const [view, setView] = useState('home');
            const [isMenuOpen, setMenuOpen] = useState(false);
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState("");
            const [activeFilter, setActiveFilter] = useState("الكل");

            // ميكانيكية الظهور عند التمرير
            useEffect(() => {
                const handleScroll = () => {
                    document.querySelectorAll('.reveal').forEach(el => {
                        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
                            el.classList.add('active');
                        }
                    });
                };
                window.addEventListener('scroll', handleScroll);
                handleScroll(); // التشغيل الأولي
                return () => window.removeEventListener('scroll', handleScroll);
            }, [view, activeFilter, search]);

            // محرك الفلترة
            const filteredData = useMemo(() => {
                return MASTER_COLLECTION.filter(p => {
                    const matchSearch = p.name.includes(search);
                    const matchCat = activeFilter === "الكل" || p.cat === activeFilter;
                    return matchSearch && matchCat;
                });
            }, [search, activeFilter]);

            // المكونات الفرعية (Sub-Components)
            const Navbar = () => (
                <nav className="fixed top-0 w-full z-[1000] px-6 lg:px-20 py-8 flex justify-between items-center glass-nav border-b">
                    <div className="text-xl font-black tracking-tight cursor-pointer" onClick={() => setView('home')}>CONSUMER.</div>
                    <div className="flex gap-10 items-center">
                        <div className="hidden lg:flex gap-10 text-[11px] tracking-[0.2em] font-bold uppercase">
                            <span onClick={() => setActiveFilter("الكل")} className="cursor-pointer transition opacity-40 hover:opacity-100">Collection</span>
                            <span onClick={() => setView('about')} className="cursor-pointer transition opacity-40 hover:opacity-100">About Us</span>
                        </div>
                        <div className="relative cursor-pointer" onClick={() => setView('cart')}>
                            <i data-lucide="shopping-bag" className="w-5 h-5 transition hover:text-blue-500"></i>
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 text-[8px] w-4 h-4 rounded-full flex items-center justify-center bg-blue-600 text-white font-bold">{cart.length}</span>}
                        </div>
                        <i data-lucide="menu" className="w-6 h-6 cursor-pointer opacity-30 hover:opacity-100" onClick={() => setMenuOpen(true)}></i>
                    </div>
                </nav>
            );

            const ProductGrid = () => (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-16 pt-20 product-grid">
                    {filteredData.map((p, i) => (
                        <div key={p.id} className="product-card-luxury reveal" style={{animationDelay: `${i * 0.1}s`}}>
                            <div className="image-container">
                                <img src={p.img} alt={p.name} className="product-image product-card-v4" loading="lazy" />
                            </div>
                            <div className="flex justify-between items-start mb-4">
                                <div className="max-w-[70%]">
                                    <h4 className="text-lg font-bold truncate mb-1">{p.name}</h4>
                                    <p className="text-[10px] uppercase tracking-widest text-gray-400">{p.cat}</p>
                                </div>
                                <span className="text-xl font-black text-blue-600">{p.price} د.ع</span>
                            </div>
                            <button 
                                onClick={() => setCart([...cart, p])}
                                className="w-full py-4 text-[10px] tracking-[0.2em] uppercase bg-black text-white rounded-xl font-bold hover:bg-gray-800 transition active:scale-95"
                            >
                                أضف للسلة
                            </button>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="relative">
                    <Navbar />

                    {/* القائمة الكبرى */}
                    <div className={`luxury-drawer ${isMenuOpen ? 'open' : ''}`}>
                        <button className="absolute top-10 right-10 text-4xl font-thin" onClick={() => setMenuOpen(false)}>&times;</button>
                        <div className="flex flex-col gap-8 text-right pr-20 max-w-lg">
                            {["الرئيسية", "المجموعات الاستهلاكية", "قصتنا", "اتصل بنا"].map((link, idx) => (
                                <div key={idx} className="drawer-link animate__animated animate__fadeInUp" style={{animationDelay: `${idx*0.1}s`}}>
                                    {link}
                                </div>
                            ))}
                        </div>
                    </div>

                    <main className="px-6 lg:px-20 pt-48 pb-40">
                        {view === 'home' && (
                            <>
                                <header className="max-w-4xl mb-40 reveal animate-pulse-slow">
                                    <h1 className="text-6xl lg:text-8xl font-blackleading-tight mb-10 tracking-tight">
                                        كل ما تحتاجه، <br/> <span className="text-blue-600 italic">في متناول يدك.</span>
                                    </h1>
                                    <div className="flex flex-col lg:flex-row gap-10 items-end">
                                        <p className="text-gray-400 max-w-sm leading-relaxed text-sm">
                                            نحن نوفر لك أفضل المنتجات الاستهلاكية بأعلى جودة وبأنسب الأسعار. تصفح مجموعتنا الحصرية الآن.
                                        </p>
                                        <div className="flex-grow w-full">
                                            <input 
                                                type="text" 
                                                placeholder="ابحث عن منتجك المفضل..." 
                                                className="w-full bg-gray-50 border border-gray-100 p-5 rounded-full outline-none focus:border-blue-500 transition text-center"
                                                onChange={(e) => setSearch(e.target.value)}
                                            />
                                        </div>
                                    </div>
                                </header>
                                <ProductGrid />
                            </>
                        )}

                        {view === 'cart' && (
                            <div className="max-w-3xl mx-auto pt-20 reveal animate__animated animate__fadeIn">
                                <h2 className="text-5xl font-black mb-16 italic tracking-tighter text-center">Checkout.</h2>
                                {cart.length === 0 ? <p className="text-gray-400 py-20 border-t border-b text-center opacity-30">السلة فارغة حالياً</p> : (
                                    <div className="space-y-6">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex gap-4 items-center bg-white/5 p-6 rounded-[2.5rem] border border-white/5 animate__animated animate__slideInRight">
                                                <img src={item.img} className="w-20 h-24 rounded-2xl object-cover" />
                                                <div className="flex-grow">
                                                    <h4 className="font-bold text-lg">{item.name}</h4>
                                                    <p className="text-sm text-blue-600 font-bold">{item.price} د.ع</p>
                                                </div>
                                                <button onClick={() => setCart(cart.filter((_, idx) => idx !== i))} className="text-red-400 text-xs p-2">إزالة</button>
                                            </div>
                                        ))}
                                        <div className="mt-20 p-10 bg-black rounded-[4rem] text-white flex flex-col items-center">
                                            <span className="text-xs uppercase tracking-[0.3em] mb-2 opacity-50">إجمالي المبلغ</span>
                                            <h3 className="text-5xl font-black mb-12">{(cart.reduce((a,b)=>a+Number(b.price.replace(/,/g,'')), 0)).toLocaleString()} د.ع</h3>
                                            <button onClick={() => window.open(`https://wa.me/رقمك_هنا?text=طلب_جديد`)} className="w-full bg-white text-black py-4 rounded-full font-black text-lg flex items-center justify-center gap-2 active:scale-95 btn-active">تأكيد الطلب via WhatsApp 💬</button>
                                        </div>
                                    </div>
                                )}
                                <button onClick={() => setView('home')} className="mt-6 text-xs opacity-30 uppercase tracking-[0.5em] text-center w-full">العودة للتسوق</button>
                            </div>
                        )}
                    </main>

                    {/* التذييل الاستهلاكي (Detailed Footer) */}
                    <footer className="footer-elite py-40 px-6 lg:px-20 border-t border-gray-100">
                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-20">
                            <div className="lg:col-span-2 space-y-10">
                                <h3 className="text-3xl font-black tracking-tight">CONSUMER TITAN.</h3>
                                <p className="text-gray-200 max-w-md leading-relaxed">متجرك الاستهلاكي الموثوق، حيث تلتقي الجودة بالسرعة والفعالية. نحن هنا لخدمتك دائماً.</p>
                            </div>
                            <div className="space-y-6 text-[10px] tracking-[0.3em] uppercase">
                                <h5 className="font-black text-gray-300">القانون الرقمي</h5>
                                <ul className="space-y-4 opacity-40">
                                    <li>سياسة الخصوصية</li>
                                    <li>شروط الخدمة</li>
                                    <li>حقوق الاستهلاك</li>
                                </ul>
                            </div>
                            <div className="space-y-6 text-[10px] tracking-[0.3em] uppercase">
                                <h5 className="font-black text-gray-300">الدعم</h5>
                                <ul className="space-y-4 opacity-40">
                                    <li>خدمة العملاء</li>
                                    <li>الأسئلة المتكررة</li>
                                    <li>اتصل بنا</li>
                                </ul>
                            </div>
                        </div>
                        <div className="mt-40 pt-10 border-t border-white/5 flex flex-col lg:flex-row justify-between items-center gap-10">
                            <p className="text-[10px] opacity-20 tracking-[1em] uppercase">© 2026 CONSUMER TITAN CORE ENGINE</p>
                            <div className="flex gap-10 opacity-40">
                                <i data-lucide="instagram" className="w-4 h-4 hover:text-white cursor-pointer"></i>
                                <i data-lucide="twitter" className="w-4 h-4 hover:text-white cursor-pointer"></i>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // تهيئة الأيقونات
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
