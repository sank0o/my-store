<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS | المتجر التفاعلي</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --dark: #0F172A;
            --card-radius: 32px;
        }
        body { background-color: #F8FAFC; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        
        .nexus-card {
            background: #fff; border-radius: var(--card-radius); padding: 18px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: 0.4s;
        }

        /* شريط التنقل السفلي - التفاعل */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--dark);
            border-radius: 24px; padding: 15px; display: flex;
            justify-content: space-around; z-index: 10000;
        }

        .nav-btn {
            background: transparent; border: none; cursor: pointer;
            padding: 10px; transition: 0.3s; display: flex; align-items: center;
            justify-content: center; border-radius: 15px;
        }

        .nav-btn.active { background: rgba(255,255,255,0.1); color: #fff !important; }
        .nav-btn i { color: rgba(255,255,255,0.4); }
        .nav-btn.active i { color: white; stroke-width: 3px; }

        .page-content { animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('home'); // home, cart, likes, profile
            const [activeCat, setActiveCat] = useState('أحذية');

            // تفعيل الأيقونات في كل مرة تتغير فيها الواجهة
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, activeCat]);

            const products = [
                { id: 1, name: "نايكي إير برو", price: "120", cat: "أحذية", img: "https://i.ibb.co/m0fXhF1/shoes-2.png" },
                { id: 2, name: "جوردن كلاسيك", price: "180", cat: "أحذية", img: "https://i.ibb.co/L8f7vKB/shoes-1.png" },
                { id: 3, name: "حقيبة ديور", price: "320", cat: "حقائب", img: "https://i.ibb.co/XW8n9X0/bag-1.png" }
            ];

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    
                    {/* محتوى الصفحة المتغير */}
                    <div className="page-content">
                        {view === 'home' && (
                            <div className="px-6">
                                <div className="flex justify-between items-center py-10">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="grid"></i></div>
                                    <h1 className="text-2xl font-black text-blue-600 italic">NEXUS</h1>
                                    <div className="bg-white p-3 rounded-2xl shadow-sm"><i data-lucide="search"></i></div>
                                </div>

                                {/* Banner */}
                                <div className="bg-slate-900 text-white rounded-[32px] p-8 relative overflow-hidden mb-10 h-[180px]">
                                    <h3 className="text-2xl font-black mb-4 relative z-10">خصم الـ 50% <br/> للأحذية</h3>
                                    <button className="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase relative z-10">تسوق الآن</button>
                                    <img src="https://i.ibb.co/m0fXhF1/shoes-2.png" className="absolute -right-5 top-0 w-48 rotate-[-20deg] opacity-50" />
                                </div>

                                {/* Grid */}
                                <div className="grid grid-cols-2 gap-4">
                                    {products.map(p => (
                                        <div key={p.id} className="nexus-card">
                                            <div className="bg-slate-50 rounded-2xl p-4 mb-4"><img src={p.img} /></div>
                                            <h4 className="font-bold text-sm">{p.name}</h4>
                                            <span className="text-blue-600 font-black">${p.price}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="px-6 pt-20 text-center">
                                <i data-lucide="shopping-bag" className="w-20 h-20 mx-auto mb-6 text-gray-200"></i>
                                <h2 className="text-3xl font-black mb-2 italic">حقيبة التسوق</h2>
                                <p className="text-gray-400">لا توجد منتجات مضافة بعد.</p>
                                <button onClick={() => setView('home')} className="mt-10 bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">اكتشف المنتجات</button>
                            </div>
                        )}

                        {view === 'likes' && (
                            <div className="px-6 pt-20 text-center">
                                <i data-lucide="heart" className="w-20 h-20 mx-auto mb-6 text-red-100"></i>
                                <h2 className="text-3xl font-black mb-2 italic">المفضلة</h2>
                                <p className="text-gray-400">ابدأ بإضافة ما يعجبك هنا.</p>
                            </div>
                        )}

                        {view === 'profile' && (
                            <div className="px-6 pt-20 text-center">
                                <div className="w-24 h-24 bg-blue-100 rounded-full mx-auto mb-6 flex items-center justify-center">
                                    <i data-lucide="user" className="w-10 h-10 text-blue-600"></i>
                                </div>
                                <h2 className="text-3xl font-black mb-2 italic">حسابي</h2>
                                <p className="text-gray-400">سجل الدخول لمتابعة طلباتك.</p>
                            </div>
                        )}
                    </div>

                    {/* شريط التنقل السفلي - الأزرار الآن تعمل باللمس */}
                    <div className="bottom-nav">
                        <button 
                            onClick={() => setView('home')} 
                            className={`nav-btn ${view === 'home' ? 'active' : ''}`}
                        >
                            <i data-lucide="home"></i>
                        </button>

                        <button 
                            onClick={() => setView('cart')} 
                            className={`nav-btn ${view === 'cart' ? 'active' : ''}`}
                        >
                            <i data-lucide="shopping-bag"></i>
                        </button>

                        <button 
                            onClick={() => setView('likes')} 
                            className={`nav-btn ${view === 'likes' ? 'active' : ''}`}
                        >
                            <i data-lucide="heart"></i>
                        </button>

                        <button 
                            onClick={() => setView('profile')} 
                            className={`nav-btn ${view === 'profile' ? 'active' : ''}`}
                        >
                            <i data-lucide="user"></i>
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
