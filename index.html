<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE X DEFACTO STYLE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; } }
        .badge-new { background: #000; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px; }
        .discount-badge { background: #ef4444; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [view, setView] = useState('shop');
            const [cart, setCart] = useState([]);
            const [category, setCategory] = useState('الكل');

            const products = [
                { id: 1, name: "فستان ناعم ميدي", price: 45000, oldPrice: 60000, img: "https://images.unsplash.com/photo-1515378791036-0648a3ef77b2?w=500", tag: "جديد" },
                { id: 2, name: "قميص قطني مخطط", price: 25000, oldPrice: 35000, img: "https://images.unsplash.com/photo-1598033129183-c4f50c717658?w=500", tag: "خصم" },
                { id: 3, name: "بنطلون جينز كلاسيك", price: 38000, oldPrice: null, img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500", tag: "جديد" },
                { id: 4, name: "جاكيت خريفي أنيق", price: 55000, oldPrice: 75000, img: "https://images.unsplash.com/photo-1539573080511-b3fb10db40b7?w=500", tag: "خصم" }
            ];

            return (
                <div className="min-h-screen">
                    {/* شريط الإعلانات العلوي (مثل DeFacto) */}
                    <div className="bg-black text-white text-[10px] py-2 text-center font-bold tracking-widest overflow-hidden">
                        <div className="animate-pulse">شحن مجاني للطلبات أكثر من 100 ألف دينار 🚚</div>
                    </div>

                    {/* الهيدر */}
                    <nav className="sticky top-0 z-50 bg-white border-b px-4 h-14 flex items-center justify-between">
                        <div className="text-xl font-black italic tracking-tighter">ELITE.</div>
                        <div className="flex gap-4 items-center">
                            <span className="text-sm font-bold cursor-pointer" onClick={() => setView('cart')}>
                                🛒 ({cart.length})
                            </span>
                        </div>
                    </nav>

                    {/* شريط الفئات السريع (مثل DeFacto) */}
                    <div className="flex overflow-x-auto no-scrollbar gap-2 p-4 border-b bg-gray-50">
                        {['الكل', 'وصلنا حديثاً', 'تخفيضات', 'الأكثر مبيعاً'].map(cat => (
                            <button 
                                key={cat}
                                onClick={() => setCategory(cat)}
                                className={`whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold border transition ${category === cat ? 'bg-black text-white' : 'bg-white text-gray-500'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <main className="pb-20">
                        {view === 'shop' && (
                            <div className="product-grid">
                                {products.map(p => (
                                    <div key={p.id} className="relative group" onClick={() => {setCart([...cart, p]); alert('تمت الإضافة للسلة')}}>
                                        <div className="aspect-[3/4] overflow-hidden bg-gray-100 rounded-lg relative">
                                            <img src={p.img} className="w-full h-full object-cover" loading="lazy" />
                                            <div className="absolute top-2 right-2">
                                                {p.tag === "جديد" ? <span className="badge-new">جديد</span> : <span className="discount-badge">تخفيض</span>}
                                            </div>
                                        </div>
                                        <div className="py-3 px-1">
                                            <h3 className="text-[11px] text-gray-500 truncate mb-1">{p.name}</h3>
                                            <div className="flex items-center gap-2">
                                                <span className="text-xs font-bold text-black">{p.price} د.ع</span>
                                                {p.oldPrice && <span className="text-[10px] text-gray-400 line-through">{p.oldPrice} د.ع</span>}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="p-5 text-center">
                                <h2 className="text-xl font-bold mb-10">حقيبة التسوق</h2>
                                {cart.length === 0 ? <p className="text-gray-400">حقيبتك فارغة</p> : (
                                    <div className="space-y-4">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex gap-4 border-b pb-4 text-right">
                                                <img src={item.img} className="w-16 h-20 object-cover" />
                                                <div className="flex-grow">
                                                    <p className="text-xs font-bold">{item.name}</p>
                                                    <p className="text-xs text-blue-600">{item.price} د.ع</p>
                                                </div>
                                            </div>
                                        ))}
                                        <button className="w-full bg-black text-white py-4 font-bold mt-10 rounded-lg">إتمام الطلب عبر واتساب</button>
                                    </div>
                                )}
                                <button onClick={() => setView('shop')} className="mt-5 text-gray-400 text-xs">العودة للتسوق</button>
                            </div>
                        )}
                    </main>

                    {/* الفوتر الثابت (Tab Bar) للجوال */}
                    <div className="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 text-[10px] font-bold text-gray-400">
                        <div onClick={() => setView('shop')} className={view === 'shop' ? 'text-black' : ''}>🏠 الرئيسية</div>
                        <div onClick={() => setView('shop')} className="opacity-50">🔍 بحث</div>
                        <div onClick={() => setView('cart')} className={view === 'cart' ? 'text-black' : ''}>🛒 السلة ({cart.length})</div>
                        <div className="opacity-50">👤 حسابي</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
